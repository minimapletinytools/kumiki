name: Build And Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish To Index
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.target }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ github.event.inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  verify:
    name: Verify Published Package
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve package version
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path('pyproject.toml').read_text())['project']['version']
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
            f.write(f"version={version}\n")
          PY

      - name: Install from selected index
        run: |
          if [ "${{ github.event.inputs.target }}" = "testpypi" ]; then
            python -m pip install --upgrade pip
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "kumiki==${{ steps.version.outputs.version }}"
          else
            python -m pip install --upgrade pip
            python -m pip install "kumiki==${{ steps.version.outputs.version }}"
          fi

      - name: Verify import and version
        run: |
          python - <<'PY'
          import kumiki

          print('Installed kumiki version:', kumiki.__version__)
          PY
