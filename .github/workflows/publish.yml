name: Build And Publish Kumiki

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      publish:
        description: "Publish the built package after building"
        required: true
        default: true
        type: boolean
      tag:
        description: "Git ref or tag to build. Defaults to current branch when empty."
        required: false
        type: string
  workflow_call:
    inputs:
      target:
        required: false
        default: "testpypi"
        type: string
      publish:
        required: false
        default: true
        type: boolean
      tag:
        required: false
        type: string
    outputs:
      version: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.package_info.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.event.inputs.tag || github.head_ref || github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          # Pre-create placeholder so the editable install doesn't fail on the
          # force-include before deps are installed.
          if [ ! -f kumiki/_pattern_index.json ]; then
            echo '{"schema_version":1,"entries":{}}' > kumiki/_pattern_index.json
          fi
          uv sync --group dev

      - name: Generate pattern index
        run: uv run --group dev python tools/build_pattern_index.py

      - name: Build package
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Resolve package version
        id: package_info
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish To Index
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event.inputs.publish == 'true' }}
    environment: ${{ inputs.target || github.event.inputs.target }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ (inputs.target || github.event.inputs.target || 'pypi') == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  verify:
    name: Verify Published Package
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event.inputs.publish == 'true' }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install from selected index
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "Build output version is empty" >&2
            exit 1
          fi

          if [ "${{ inputs.target || github.event.inputs.target }}" = "testpypi" ]; then
            python -m pip install --upgrade pip
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "kumiki==$VERSION"
          else
            python -m pip install --upgrade pip
            python -m pip install "kumiki==$VERSION"
          fi

      - name: Verify import and version
        run: |
          python - <<'PY'
          import kumiki

          print('Installed kumiki version:', kumiki.__version__)
          PY
