name: Build And Publish Kigumi

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Publish as a VS Code Marketplace pre-release
        required: true
        default: false
        type: boolean

  pull_request:
    paths:
      - 'kigumi/**'
      - '.github/workflows/publish-kigumi.yml'

jobs:
  build:
    name: Test And Package Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.package_info.outputs.version }}
      vsix_name: ${{ steps.package_info.outputs.vsix_name }}

    defaults:
      run:
        working-directory: kigumi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          if [ ! -f ../kumiki/_pattern_index.json ]; then
            echo '{"schema_version":1,"entries":{}}' > ../kumiki/_pattern_index.json
          fi
          uv sync --group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kigumi/package.json

      - name: Install Node.js dependencies
        run: npm install

      - name: Stage bundled docs
        run: |
          mkdir -p .kigumi/docs
          rsync -a --delete ../docs/ .kigumi/docs/

      - name: Run unit tests
        run: npm run test:unit

      - name: Package extension
        run: |
          EXTRA_ARGS=()
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            EXTRA_ARGS+=(--pre-release)
          fi
          npx @vscode/vsce package "${EXTRA_ARGS[@]}"

      - name: Resolve VSIX name
        id: package_info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX_NAME="kigumi-${VERSION}.vsix"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix_name=${VSIX_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kigumi-vsix
          path: kigumi/${{ steps.package_info.outputs.vsix_name }}

  publish:
    name: Publish To VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: kigumi-vsix
          path: .

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            EXTRA_ARGS+=(--pre-release)
          fi
          npx @vscode/vsce publish --packagePath "${{ needs.build.outputs.vsix_name }}" --pat "$VSCE_PAT" "${EXTRA_ARGS[@]}"