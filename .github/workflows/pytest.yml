name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.12

    - name: Cache uv artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-py3.12-

    - name: Install dependencies
      run: |
        # Pre-create the pattern index placeholder so the editable install's
        # force-include doesn't fail before deps are present (chicken-and-egg).
        if [ ! -f kumiki/_pattern_index.json ]; then
          echo '{"schema_version":1,"entries":{}}' > kumiki/_pattern_index.json
        fi
        # Only render-matplotlib: it's genuinely headless. render (pyglet)
        # needs a real X server (Xvfb) on Linux to actually open a window,
        # which this runner doesn't have -- installing it here would
        # un-skip the RenderBackend.TRIMESH_PYGLET tests and they'd fail
        # trying to render with no display. Those stay skipped on CI.
        uv sync --group dev --extra render-matplotlib

    - name: Generate pattern index
      run: uv run --group dev python tools/build_pattern_index.py

    - name: Run pytest
      run: uv run --group dev python -m pytest tests/
