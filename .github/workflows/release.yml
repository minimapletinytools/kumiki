name: Create GitHub Release

on:
  push:
    tags:
      - 'kumiki-v*'
      - 'kigumi-v*'

  workflow_dispatch:
    inputs:
      target:
        description: Which project to release
        required: true
        type: choice
        options:
          - kumiki
          - kigumi
      tag:
        description: Git tag to build and publish (for example, kumiki-v0.2.4)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-kumiki:
    name: Release Kumiki
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/kumiki-v')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'kumiki')
      }}

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG" =~ ^kumiki-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like kumiki-v0.2.4, got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#kumiki-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Validate package version matches tag
        shell: bash
        run: |
          TAG_VERSION="${{ steps.release_tag.outputs.version }}"
          FILE_VERSION=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")

          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          if [ ! -f kumiki/_pattern_index.json ]; then
            echo '{"schema_version":1,"entries":{}}' > kumiki/_pattern_index.json
          fi
          uv sync --group dev

      - name: Generate pattern index
        run: uv run --group dev python tools/build_pattern_index.py

      - name: Build package
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Kumiki v${{ steps.release_tag.outputs.version }}
          generate_release_notes: true
          body: |
            Python package release assets for Kumiki v${{ steps.release_tag.outputs.version }}.

            Install from PyPI after publishing:

            ```bash
            pip install kumiki==${{ steps.release_tag.outputs.version }}
            ```

            Or install directly from the attached wheel.
          files: dist/*

  release-kigumi:
    name: Release Kigumi
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/kigumi-v')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'kigumi')
      }}

    defaults:
      run:
        working-directory: kigumi

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG" =~ ^kigumi-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like kigumi-v0.1.4, got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#kigumi-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Validate package version matches tag
        shell: bash
        working-directory: kigumi
        run: |
          TAG_VERSION="${{ steps.release_tag.outputs.version }}"
          FILE_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match kigumi/package.json ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          if [ ! -f ../kumiki/_pattern_index.json ]; then
            echo '{"schema_version":1,"entries":{}}' > ../kumiki/_pattern_index.json
          fi
          uv sync --group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kigumi/package.json

      - name: Install Node.js dependencies
        run: npm install

      - name: Stage bundled docs
        run: |
          mkdir -p .kigumi/docs
          rsync -a --delete ../docs/ .kigumi/docs/

      - name: Run unit tests
        run: npm run test:unit

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Resolve VSIX name
        id: package_info
        shell: bash
        run: |
          VSIX_NAME="kigumi-${{ steps.release_tag.outputs.version }}.vsix"
          if [ ! -f "$VSIX_NAME" ]; then
            echo "Expected VSIX not found: $VSIX_NAME" >&2
            ls -la *.vsix || true
            exit 1
          fi
          echo "vsix_name=${VSIX_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Kigumi v${{ steps.release_tag.outputs.version }}
          generate_release_notes: true
          body: |
            VS Code extension release for Kigumi v${{ steps.release_tag.outputs.version }}.

            Install locally from the attached `.vsix`:

            ```bash
            code --install-extension kigumi-${{ steps.release_tag.outputs.version }}.vsix
            ```
          files: kigumi/${{ steps.package_info.outputs.vsix_name }}
