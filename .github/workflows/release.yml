name: Release and Publish

on:
  push:
    tags:
      - 'kumiki-v*'
      - 'kigumi-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release. Defaults to the pushed tag or the latest tag when empty."
        required: false
        type: string
      kumiki:
        description: "Include kumiki in this workflow run."
        required: true
        default: true
        type: boolean
      kumiki_publish:
        description: "Publish kumiki to PyPI/TestPyPI."
        required: true
        default: true
        type: boolean
      kumiki_publish_target:
        description: "Publish kumiki to the selected PyPI index."
        required: true
        default: pypi
        type: choice
        options:
          - testpypi
          - pypi
      kumiki_release:
        description: "Create a GitHub release asset for kumiki."
        required: true
        default: true
        type: boolean
      kigumi:
        description: "Include kigumi in this workflow run."
        required: true
        default: true
        type: boolean
      kigumi_publish_vscode:
        description: "Publish kigumi to the VS Code Marketplace."
        required: true
        default: true
        type: boolean
      kigumi_publish_ovsx:
        description: "Publish kigumi to Open VSX."
        required: true
        default: true
        type: boolean
      kigumi_prerelease:
        description: "Publish kigumi as a pre-release when sending to marketplaces."
        required: true
        default: false
        type: boolean
      kigumi_release:
        description: "Create a GitHub release asset for kigumi."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve_tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      prefix: ${{ steps.resolve.outputs.prefix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              TAG="${{ github.ref_name }}"
            else
              git fetch --tags --prune
              TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            fi
          fi

          if [[ "$TAG" =~ ^kumiki-v ]]; then
            PREFIX=kumiki
          elif [[ "$TAG" =~ ^kigumi-v ]]; then
            PREFIX=kigumi
          else
            echo "Tag must start with kumiki-v or kigumi-v, got: $TAG" >&2
            exit 1
          fi

          if [ -z "$TAG" ]; then
            echo "No tag specified and no tag could be resolved." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

  build_kumiki:
    name: Build Kumiki Package
    needs: [resolve_tag]
    if: ${{ needs.resolve_tag.outputs.prefix == 'kumiki' && (github.event_name == 'push' || inputs.kumiki == true || github.event.inputs.kumiki == 'true' || inputs.kumiki_publish == true || github.event.inputs.kumiki_publish == 'true' || inputs.kumiki_release == true || github.event.inputs.kumiki_release == 'true') }}
    uses: ./.github/workflows/publish.yml
    with:
      target: ${{ inputs.kumiki_publish_target || github.event.inputs.kumiki_publish_target || 'pypi' }}
      publish: false
      tag: ${{ inputs.tag || github.event.inputs.tag || github.ref_name }}

  build_kigumi:
    name: Build Kigumi Extension
    needs: [resolve_tag]
    if: ${{ needs.resolve_tag.outputs.prefix == 'kigumi' && (github.event_name == 'push' || inputs.kigumi == true || github.event.inputs.kigumi == 'true' || inputs.kigumi_publish_vscode == true || github.event.inputs.kigumi_publish_vscode == 'true' || inputs.kigumi_publish_ovsx == true || github.event.inputs.kigumi_publish_ovsx == 'true' || inputs.kigumi_release == true || github.event.inputs.kigumi_release == 'true') }}
    uses: ./.github/workflows/publish-kigumi.yml
    with:
      target: both
      publish: false
      prerelease: ${{ inputs.kigumi_prerelease == true || github.event.inputs.kigumi_prerelease == 'true' }}
      tag: ${{ inputs.tag || github.event.inputs.tag || github.ref_name }}

  publish_kumiki:
    name: Publish kumiki to PyPI
    needs:
      - resolve_tag
      - build_kumiki
    runs-on: ubuntu-latest
    if: ${{ (inputs.kumiki_publish == true || github.event.inputs.kumiki_publish == 'true' || github.event_name == 'push') && needs.resolve_tag.outputs.prefix == 'kumiki' }}
    permissions:
      contents: read

    steps:
      - name: Download kumiki artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ (inputs.kumiki_publish_target || github.event.inputs.kumiki_publish_target || 'pypi') == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  publish_kigumi_vscode:
    name: Publish kigumi to VS Code Marketplace
    needs:
      - resolve_tag
      - build_kigumi
    runs-on: ubuntu-latest
    if: ${{ (inputs.kigumi_publish_vscode == true || github.event.inputs.kigumi_publish_vscode == 'true' || github.event_name == 'push') && needs.resolve_tag.outputs.prefix == 'kigumi' }}
    permissions:
      contents: read

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: kigumi-vsix
          path: .

      - name: Publish extension to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ "${{ inputs.kigumi_prerelease == true || github.event.inputs.kigumi_prerelease == 'true' }}" = "true" ]; then
            EXTRA_ARGS+=(--pre-release)
          fi
          npx @vscode/vsce publish --packagePath "${{ needs.build_kigumi.outputs.vsix_name }}" --pat "$VSCE_PAT" "${EXTRA_ARGS[@]}"

  publish_kigumi_ovsx:
    name: Publish kigumi to Open VSX
    needs:
      - resolve_tag
      - build_kigumi
    runs-on: ubuntu-latest
    if: ${{ (inputs.kigumi_publish_ovsx == true || github.event.inputs.kigumi_publish_ovsx == 'true' || github.event_name == 'push') && needs.resolve_tag.outputs.prefix == 'kigumi' }}
    permissions:
      contents: read

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: kigumi-vsix
          path: .

      - name: Publish extension to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OPENVSXPAT }}
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ "${{ inputs.kigumi_prerelease == true || github.event.inputs.kigumi_prerelease == 'true' }}" = "true" ]; then
            EXTRA_ARGS+=(--pre-release)
          fi
          npx ovsx publish "${{ needs.build_kigumi.outputs.vsix_name }}" --pat "$OVSX_PAT" "${EXTRA_ARGS[@]}"

  create_release:
    name: Create GitHub Release
    needs:
      - resolve_tag
      - build_kumiki
      - build_kigumi
    if: ${{ !cancelled() && needs.resolve_tag.result == 'success' && ((needs.resolve_tag.outputs.prefix == 'kumiki' && (inputs.kumiki_release == true || github.event.inputs.kumiki_release == 'true' || github.event_name == 'push')) || (needs.resolve_tag.outputs.prefix == 'kigumi' && (inputs.kigumi_release == true || github.event.inputs.kigumi_release == 'true' || github.event_name == 'push'))) }}
    runs-on: ubuntu-latest

    steps:
      - name: Download kumiki assets
        if: ${{ needs.resolve_tag.outputs.prefix == 'kumiki' && (inputs.kumiki_release == true || github.event.inputs.kumiki_release == 'true' || github.event_name == 'push') }}
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: kumiki-dist

      - name: Download kigumi assets
        if: ${{ needs.resolve_tag.outputs.prefix == 'kigumi' && (inputs.kigumi_release == true || github.event.inputs.kigumi_release == 'true' || github.event_name == 'push') }}
        uses: actions/download-artifact@v4
        with:
          name: kigumi-vsix
          path: kigumi-dist

      - name: Build release file list
        id: files
        shell: bash
        run: |
          files=()
          if [ "${{ inputs.kumiki_release == true || github.event.inputs.kumiki_release == 'true' || github.event_name == 'push' }}" = "true" ] && [ -d kumiki-dist ]; then
            files+=("kumiki-dist/dist/*")
          fi
          if [ "${{ inputs.kigumi_release == true || github.event.inputs.kigumi_release == 'true' || github.event_name == 'push' }}" = "true" ] && [ -d kigumi-dist ]; then
            files+=("kigumi-dist/*.vsix")
          fi
          printf '%s\n' "${files[@]}" > release-files.txt
          echo "files=$(python -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))' < release-files.txt)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.tag }}
          name: ${{ needs.resolve_tag.outputs.tag }}
          generate_release_notes: true
          body: |
            Release for tag ${{ needs.resolve_tag.outputs.tag }}.

            This release contains the selected kumiki and/or kigumi artifacts.
          files: ${{ fromJson(steps.files.outputs.files) }}
